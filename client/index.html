<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>IELTS Vocabulary Asteroid Game</title>

    <!-- SEO -->
    <meta name="description" content="Learn 708 IELTS vocabulary words by typing them to destroy falling asteroids. Supports 11 languages, AI tips via Gemini, and a global leaderboard." />
    <meta name="keywords" content="IELTS, vocabulary, asteroid game, typing game, English learning, language learning" />

    <!-- OGP / Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="IELTS Vocabulary Asteroid Game" />
    <meta property="og:description" content="Learn 708 IELTS vocabulary words by typing them to destroy falling asteroids. Supports 11 languages and AI tips." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310419663027084947/9DnwzxsHiWb7cWTxwRXotk/ogp-ielts-asteroid-hYanEgMpi5kSXMLSWue6wc.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="IELTS Vocabulary Asteroid Game" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IELTS Vocabulary Asteroid Game" />
    <meta name="twitter:description" content="Learn 708 IELTS vocabulary words by typing them to destroy falling asteroids." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310419663027084947/9DnwzxsHiWb7cWTxwRXotk/ogp-ielts-asteroid-hYanEgMpi5kSXMLSWue6wc.png" />

    <!-- Game stylesheet -->
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <div id="root"></div>
    <!-- Game scripts loaded globally before React so vanilla JS can access globals -->
    <script src="/ielts_words.js?v=1"></script>
    <script src="/gemini.js?v=2"></script>
    <script src="/script.js?v=3"></script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
